name: Build static WeeChat

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Windows / MSYS2 ───────────────────────────────────────
  msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2 packages
        run: |
          pacman -Syuu --noconfirm
          pacman -S --noconfirm \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-pkgconf \
            mingw-w64-x86_64-ncurses \
            mingw-w64-x86_64-libcurl \
            mingw-w64-x86_64-libgcrypt \
            mingw-w64-x86_64-gnutls \
            mingw-w64-x86_64-zlib \
            mingw-w64-x86_64-libtool \
            git base-devel

      - name: Build static WeeChat
        env:
          CFLAGS: "-static -O2"
          LDFLAGS: "-static"
        run: |
          export MSYSTEM=MINGW64
          git clone https://github.com/weechat/weechat.git
          cd weechat
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$HOME/.local -DENABLE_STATIC=ON -DENABLE_MAN=OFF -DENABLE_DOC=OFF
          make -j$(nproc)
          make install

      - name: Archive binary
        if: always()
        run: |
          cd $HOME/.local/bin
          tar -czf weechat-msys2.tar.gz weechat
        continue-on-error: true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weechat-msys2
          path: ${{ runner.temp }}/.local/bin/weechat-msys2.tar.gz
          # The path works because the previous step ran inside $HOME/.local/bin

  # ── Ubuntu / Bookworm ───────────────────────────────────────
  ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Ubuntu build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libncurses5-dev \
            libcurl4-openssl-dev \
            libgcrypt20-dev \
            libgnutls28-dev \
            zlib1g-dev \
            libtool \
            git

      - name: Build static WeeChat
        env:
          CFLAGS: "-static -O2"
          LDFLAGS: "-static"
        run: |
          git clone https://github.com/weechat/weechat.git
          cd weechat
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$HOME/.local -DENABLE_STATIC=ON -DENABLE_MAN=OFF -DENABLE_DOC=OFF
          make -j$(nproc)
          make install

      - name: Archive binary
        if: always()
        run: |
          cd $HOME/.local/bin
          tar -czf weechat-ubuntu.tar.gz weechat

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weechat-ubuntu
          path: $HOME/.local/bin/weechat-ubuntu.tar.gz
