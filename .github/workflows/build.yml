# .github/workflows/build-weechat.yml
name: Build static WeeChat (Linux & Windows)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ------------------- Linux -------------------
  ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libncurses-dev libcurl4-openssl-dev libgcrypt20-dev \
            libgnutls28-dev zlib1g-dev libtool libcjson-dev \
            gettext tcl-dev tk-dev php-dev libperl-dev git

      - name: Build static WeeChat (Linux)
        env:
          CFLAGS: "-static -O2"
          LDFLAGS: "-static"
        run: |
          git clone https://github.com/weechat/weechat.git
          cd weechat
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$HOME/.local \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_STATIC=ON \
            -DENABLE_MAN=OFF -DENABLE_DOC=OFF -DENABLE_ALIAS=OFF \
            -DENABLE_PERL=OFF -DENABLE_PHP=OFF -DENABLE_TCL=OFF -DENABLE_TK=OFF \
            -DENABLE_PLUGIN_BUFLIST=OFF -DENABLE_PLUGIN_CHARSET=OFF \
            -DENABLE_PLUGIN_SCRIPT=OFF -DENABLE_PLUGIN_TRIGGER=OFF \
            -DENABLE_PLUGIN_ASPELL=OFF -DENABLE_PLUGIN_BUFFERS=OFF
          make -j$(nproc)
          make install

      - name: Archive Linux binary
        if: always()
        run: |
          cd $HOME/.local/bin
          tar -czf weechat-linux.tar.gz weechat

      - name: Upload Linux artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weechat-linux
          path: $HOME/.local/bin/weechat-linux.tar.gz

  # ------------------- Windows -------------------
  msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2 packages
        uses: msys2/setup-msys2@v2
        with:
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-ncurses
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-libgcrypt
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libtool
            mingw-w64-x86_64-cjson
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-ruby
            mingw-w64-x86_64-winpthreads
            mingw-w64-x86_64-headers
            base-devel git

      - name: Build static WeeChat (Windows)
        env:
          CFLAGS: "-static -O2"
          LDFLAGS: "-static"
        run: |
          git clone https://github.com/weechat/weechat.git
          cd weechat
          mkdir build && cd build
          cmake .. -G "MSYS Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$HOME/.local \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_STATIC=ON \
            -DENABLE_MAN=OFF -DENABLE_DOC=OFF -DENABLE_ALIAS=OFF \
            -DENABLE_PERL=OFF -DENABLE_PHP=OFF -DENABLE_TCL=OFF -DENABLE_TK=OFF \
            -DENABLE_PLUGIN_BUFLIST=OFF -DENABLE_PLUGIN_CHARSET=OFF \
            -DENABLE_PLUGIN_SCRIPT=OFF -DENABLE_PLUGIN_TRIGGER=OFF \
            -DENABLE_PLUGIN_ASPELL=OFF -DENABLE_PLUGIN_BUFFERS=OFF
          make -j$(nproc)
          make install

      - name: Archive Windows binary
        if: always()
        run: |
          cd $HOME/.local/bin
          tar -czf weechat-windows.tar.gz weechat

      - name: Upload Windows artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weechat-windows
          path: $HOME/.local/bin/weechat-windows.tar.gz
