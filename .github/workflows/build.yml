name: Build WeeChat Debian packages
on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  build-debian:
    runs-on: ubuntu-22.04
    env:
      PACKAGER_NAME: ${{ secrets.PACKAGER_NAME || 'GitHub Actions' }}
      PACKAGER_EMAIL: ${{ secrets.PACKAGER_EMAIL || 'actions@github.com' }}
      JOBS: auto
      RETRY_BUILD: 0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper dh-autoreconf devscripts \
            pkg-config pkgconf git build-essential \
            libncursesw5-dev libgcrypt20-dev \
            libssl-dev libjansson-dev libcurl4-gnutls-dev \
            libzstd-dev libgettextpo-dev libxml2-dev \
            libperl-dev python3-dev ruby-dev tcl-dev \
            liblua5.3-dev libpython3-dev liblua5.4-dev \
            libaspell-dev libenchant-2-dev libgtk-3-dev libv8-dev \
            asciidoctor ruby-pygments.rb cmake \
            guile-3.0-dev php-dev libphp-embed \
            libargon2-dev libsodium-dev libgnutls28-dev libcjson-dev \
            gem2deb

      - name: Build Debian packages
        env:
          VERSION: stable
          DISTRO: debian/bookworm
        run: |
          chmod +x ./tools/build_debian.sh
          ./tools/build_debian.sh "${VERSION}" "${DISTRO}" -d

      - name: Upload Debian packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weechat-deb
          path: |
            *.deb
            *.changes
            *.buildinfo
