# .github/workflows/build‑weechat.yml
name: Build static WeeChat (Linux & Windows)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # -------------------------------------------------
  # Linux – Ubuntu 24.04 (Debian Bookworm)
  # -------------------------------------------------
  ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libncurses-dev libcurl4-gnutls-dev libgcrypt20-dev \
            libgnutls28-dev zlib1g-dev libtool libcjson-dev \
            gettext tcl-dev tk-dev php-dev libperl-dev git

      - name: Build static WeeChat (Linux)
        env:
          CFLAGS: "-static -O2"
          LDFLAGS: "-static"
        run: |
          git clone https://github.com/weechat/weechat.git
          cd weechat
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$HOME/.local \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_STATIC=ON \
            -DENABLE_MAN=OFF -DENABLE_DOC=OFF -DENABLE_ALIAS=OFF \
            -DENABLE_PERL=OFF -DENABLE_PHP=OFF -DENABLE_TCL=OFF -DENABLE_TK=OFF \
            -DENABLE_PLUGIN_BUFLIST=OFF \
            -DENABLE_PLUGIN_CHARSET=OFF \
            -DENABLE_PLUGIN_SCRIPT=OFF \
            -DENABLE_PLUGIN_TRIGGER=OFF \
            -DENABLE_PLUGIN_ASPELL=OFF \
            -DENABLE_PLUGIN_BUFFERS=OFF
          make -j$(nproc)
          make install

      - name: Archive Linux binary
        if: always()
        run: |
          cd $HOME/.local/bin
          tar -czf weechat-linux.tar.gz weechat

      - name: Upload Linux artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weechat-linux
          path: $HOME/.local/bin/weechat-linux.tar.gz

  # -------------------------------------------------
  # Windows – MSYS2 (POSIX layer, not MinGW)
  # -------------------------------------------------
  msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      # Install the POSIX toolchain (gcc, make, etc.) inside the MSYS environment
      - name: Install MSYS2 packages (POSIX toolchain)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: >-
            base-devel          # gcc, make, autoconf, …
            gcc
            cmake
            pkgconf
            ncurses
            curl
            libgcrypt
            gnutls
            zlib
            libtool
            cjson
            gettext
            ruby
            git

      - name: Build static WeeChat (Windows / MSYS2)
        env:
          CFLAGS: "-static -O2"
          LDFLAGS: "-static"
        run: |
          git clone https://github.com/weechat/weechat.git
          cd weechat
          mkdir build && cd build
          cmake .. -G "MSYS Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$HOME/.local \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_STATIC=ON \
            -DENABLE_MAN=OFF -DENABLE_DOC=OFF -DENABLE_ALIAS=OFF \
            -DENABLE_PERL=OFF -DENABLE_PHP=OFF -DENABLE_TCL=OFF -DENABLE_TK=OFF \
            -DENABLE_PLUGIN_BUFLIST=OFF \
            -DENABLE_PLUGIN_CHARSET=OFF \
            -DENABLE_PLUGIN_SCRIPT=OFF \
            -DENABLE_PLUGIN_TRIGGER=OFF \
            -DENABLE_PLUGIN_ASPELL=OFF \
            -DENABLE_PLUGIN_BUFFERS=OFF
          make -j$(nproc)
          make install

      - name: Archive Windows binary
        if: always()
        run: |
          cd $HOME/.local/bin
          tar -czf weechat-windows.tar.gz weechat

      - name: Upload Windows artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weechat-windows
          path: $HOME/.local/bin/weechat-windows.tar.gz
